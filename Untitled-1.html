<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex 1ra Generación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f3f3f3;
            color: #222;
        }

        /* NAV */
        .navbar {
            width: 100%;
            background: #e3350d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 18px 20px;
            flex-wrap: wrap;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }

        .navbar h2 {
            font-size: 30px;
            margin-right: 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 17px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.2s;
        }

        .navbar a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* CONTENEDOR */
        .contenedor {
            width: 90%;
            max-width: 1250px;
            margin: 35px auto;
        }

        .titulo {
            text-align: center;
            margin-bottom: 10px;
            font-size: 50px;
            font-weight: 800;
            color: #1f2d3d;
        }

        .subtitulo {
            text-align: center;
            color: #666;
            font-size: 20px;
            margin-bottom: 30px;
        }

        /* CONTROLES */
        .controles {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }

        .buscador,
        .filtro,
        .boton-random {
            height: 58px;
            border: none;
            border-radius: 14px;
            font-size: 19px;
        }

        .buscador {
            width: 340px;
            padding: 0 18px;
            background: white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            outline: none;
        }

        .filtro {
            width: 260px;
            padding: 0 15px;
            background: white;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            outline: none;
            cursor: pointer;
        }

        .boton-random {
            padding: 0 25px;
            background: #3498db;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
        }

        .boton-random:hover {
            background: #2f89c5;
        }

        /* GRID */
        .catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* CARD */
        .card {
            background: white;
            border-radius: 18px;
            padding: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: 0.25s;
            position: relative;
            overflow: hidden;
            min-height: 390px;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .numero {
            font-size: 16px;
            color: #9a9a9a;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .numero span {
            color: #e3350d;
        }

        .imagen-box {
            width: 100%;
            height: 210px;
            background: #f1f1f1;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        .imagen-box img {
            width: 180px;
            height: 180px;
            object-fit: contain;
        }

        .nombre {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 14px;
        }

        .tipos {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tipo {
            padding: 7px 16px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .planta {
            background: #78C850;
        }

        .veneno {
            background: #A040A0;
        }

        .fuego {
            background: #F08030;
        }

        .agua {
            background: #6890F0;
        }

        .electrico {
            background: #F8D030;
            color: #333;
        }

        .normal {
            background: #A8A878;
        }

        .hada {
            background: #EE99AC;
        }

        .volador {
            background: #A890F0;
        }

        .mensaje {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 22px;
            color: #666;
            padding: 30px 0;
        }

        .pie {
            text-align: center;
            color: #777;
            margin-top: 25px;
            font-size: 18px;
        }

        @media(max-width:768px) {
            .titulo {
                font-size: 36px;
            }

            .subtitulo {
                font-size: 17px;
            }

            .buscador,
            .filtro,
            .boton-random {
                width: 100%;
                max-width: 500px;
            }

            .navbar {
                gap: 12px;
            }

            .navbar h2 {
                width: 100%;
                text-align: center;
                margin-right: 0;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <h2>Pokédex 1ra Generación</h2>
        <a href="#">Inicio</a>
        <a href="#">Pokédex</a>
        <a href="#">Juegos</a>
        <a href="#">Coleccionables</a>
        <a href="#">Noticias</a>
    </nav>

    <div class="contenedor">
        <h1 class="titulo">Catálogo Pokémon 1ra Generación</h1>
        <p class="subtitulo">Solo 6 pokémon, sin legendarios ni cosas raras</p>

        <div class="controles">
            <input type="text" id="busqueda" class="buscador" placeholder="Buscar pokémon...">

            <select id="filtroTipo" class="filtro">
                <option value="">Todos los tipos</option>
            </select>

            <button class="boton-random" id="sorpresa">¡Sorpréndeme!</button>
        </div>

        <section class="catalogo" id="catalogo">
            <p class="mensaje">Cargando pokémons...</p>
        </section>

        <p class="pie" id="pieTexto">Mostrando 6 pokémon de la 1ra generación.</p>
    </div>

    <script>
        const catalogo = document.getElementById("catalogo");
        const busqueda = document.getElementById("busqueda");
        const filtroTipo = document.getElementById("filtroTipo");
        const sorpresa = document.getElementById("sorpresa");
        const pieTexto = document.getElementById("pieTexto");

        let pokemones = [];
        let pokemonesFiltrados = [];

        // SOLO 6 POKÉMONES
        const idsPokemon = [1, 4, 7, 25, 133, 39];

        async function cargarPokemones() {
            try {
                const promesas = idsPokemon.map(async (id) => {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    const data = await res.json();

                    return {
                        id: data.id,
                        nombre: data.name,
                        imagen: data.sprites.other["official-artwork"].front_default || data.sprites.front_default,
                        tipos: data.types.map(t => t.type.name)
                    };
                });

                pokemones = await Promise.all(promesas);
                pokemonesFiltrados = [...pokemones];

                llenarTipos();
                renderizarPokemones(pokemonesFiltrados);
            } catch (error) {
                console.error("Error cargando pokémons:", error);
                catalogo.innerHTML = `<p class="mensaje">No se pudieron cargar los pokémons.</p>`;
            }
        }

        function traducirTipo(tipo) {
            const traducciones = {
                grass: "planta",
                poison: "veneno",
                fire: "fuego",
                water: "agua",
                electric: "electrico",
                normal: "normal",
                fairy: "hada",
                flying: "volador"
            };
            return traducciones[tipo] || tipo;
        }

        function claseTipo(tipo) {
            const clases = {
                grass: "planta",
                poison: "veneno",
                fire: "fuego",
                water: "agua",
                electric: "electrico",
                normal: "normal",
                fairy: "hada",
                flying: "volador"
            };
            return clases[tipo] || "normal";
        }

        function renderizarPokemones(lista) {
            if (lista.length === 0) {
                catalogo.innerHTML = `<p class="mensaje">No se encontraron pokémons.</p>`;
                pieTexto.textContent = "Mostrando 0 pokémon.";
                return;
            }

            catalogo.innerHTML = lista.map(pokemon => `
        <div class="card">
          <div class="numero"><span>N.º</span> ${pokemon.id.toString().padStart(4, "0")}</div>
          
          <div class="imagen-box">
            <img src="${pokemon.imagen}" alt="${pokemon.nombre}">
          </div>

          <div class="nombre">${capitalizar(pokemon.nombre)}</div>

          <div class="tipos">
            ${pokemon.tipos.map(tipo => `
              <span class="tipo ${claseTipo(tipo)}">${capitalizar(traducirTipo(tipo))}</span>
            `).join("")}
          </div>
        </div>
      `).join("");

            pieTexto.textContent = `Mostrando ${lista.length} pokémon de la 1ra generación.`;
        }

        function capitalizar(texto) {
            return texto.charAt(0).toUpperCase() + texto.slice(1);
        }

        function llenarTipos() {
            const tiposUnicos = [...new Set(pokemones.flatMap(p => p.tipos))];

            tiposUnicos.forEach(tipo => {
                const option = document.createElement("option");
                option.value = tipo;
                option.textContent = capitalizar(traducirTipo(tipo));
                filtroTipo.appendChild(option);
            });
        }

        function aplicarFiltros() {
            const texto = busqueda.value.toLowerCase().trim();
            const tipoSeleccionado = filtroTipo.value;

            pokemonesFiltrados = pokemones.filter(pokemon => {
                const coincideNombre = pokemon.nombre.toLowerCase().includes(texto);
                const coincideTipo = tipoSeleccionado === "" || pokemon.tipos.includes(tipoSeleccionado);
                return coincideNombre && coincideTipo;
            });

            renderizarPokemones(pokemonesFiltrados);
        }

        function pokemonAleatorio() {
            const random = pokemones[Math.floor(Math.random() * pokemones.length)];
            busqueda.value = random.nombre;
            aplicarFiltros();
        }

        busqueda.addEventListener("input", aplicarFiltros);
        filtroTipo.addEventListener("change", aplicarFiltros);
        sorpresa.addEventListener("click", pokemonAleatorio);

        cargarPokemones();
    </script>
</body>

</html>
