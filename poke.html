<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Stadium Canvas - Kanto 151</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --pk-red: #C03928;
            --pk-grey: #7F8C8D;
            --pk-yellow: #F1C40F;
            --pk-dark-blue: #2C3E50;
        }

        body {
            background-color: var(--pk-dark-blue);
            color: white;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        canvas {
            display: block;
            touch-action: none;
            image-rendering: auto;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .pointer-events-auto {
            pointer-events: auto;
        }

        .text-pk-yellow {
            color: var(--pk-yellow);
        }

        .bg-pk-red {
            background-color: var(--pk-red);
        }

        .bg-pk-grey {
            background-color: var(--pk-grey);
        }

        .bg-pk-dark {
            background-color: #1a252f;
        }

        .border-pk-grey {
            border-color: var(--pk-grey);
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center h-screen">

    <!-- Capa de Interfaz de Usuario (UI) -->
    <div id="ui-layer" class="p-4 md:p-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1
                    class="text-4xl font-black italic tracking-tighter text-pk-yellow drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                    POKÉMON STADIUM
                </h1>
                <p class="text-xs font-bold text-white/70 uppercase tracking-widest">Kanto Edition | 151 Pokémon</p>
            </div>

            <div class="flex gap-4 pointer-events-auto items-center">
                <div class="bg-black/40 border border-white/10 px-6 py-2 rounded-xl backdrop-blur-sm">
                    <span class="text-[10px] block text-pk-yellow font-bold uppercase">Tu Equipo</span>
                    <span id="team-count" class="text-2xl font-black italic">0 / 6</span>
                </div>

                <button id="btn-battle" onclick="startBattle()"
                    class="hidden bg-pk-red hover:brightness-110 text-white px-10 py-3 rounded-xl font-black italic transition-all transform hover:scale-105 shadow-xl border-b-4 border-black/30">
                    ¡BATALLA!
                </button>

                <button id="btn-reset" onclick="resetApp()"
                    class="hidden bg-pk-grey hover:bg-white hover:text-black text-white px-6 py-3 rounded-xl font-bold transition-all border-b-4 border-black/30">
                    REINICIAR
                </button>
            </div>
        </div>

        <div id="instruction" class="text-center mt-4 text-sm font-bold text-white/50 uppercase tracking-tighter">
            Selecciona 6 Pokémon para desafiar a la máquina
        </div>
    </div>

    <!-- El Canvas Principal -->
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const teamCountDisplay = document.getElementById('team-count');
        const btnBattle = document.getElementById('btn-battle');
        const btnReset = document.getElementById('btn-reset');
        const instruction = document.getElementById('instruction');

        // Configuración y Datos
        let gameState = 'CATALOG';
        let scrollY = 0;
        let selectedIds = new Set();
        let hoveredId = null;
        let images = {};
        let rivalTeam = [];
        let playerTotal = 0;
        let rivalTotal = 0;

        // Paleta de colores para JS
        const COLORS = {
            red: '#C03928',
            grey: '#7F8C8D',
            yellow: '#F1C40F',
            darkBlue: '#2C3E50'
        };

        // Generación de los 151 nombres de Kanto
        const NAMES = [
            "Bulbasaur", "Ivysaur", "Venusaur", "Charmander", "Charmeleon", "Charizard", "Squirtle", "Wartortle", "Blastoise", "Caterpie", "Metapod", "Butterfree", "Weedle", "Kakuna", "Beedrill", "Pidgey", "Pidgeotto", "Pidgeot", "Rattata", "Raticate", "Spearow", "Fearow", "Ekans", "Arbok", "Pikachu", "Raichu", "Sandshrew", "Sandslash", "Nidoran♀", "Nidorina", "Nidoqueen", "Nidoran♂", "Nidorino", "Nidoking", "Clefairy", "Clefable", "Vulpix", "Ninetales", "Jigglypuff", "Wigglytuff", "Zubat", "Golbat", "Oddish", "Gloom", "Vileplume", "Paras", "Parasect", "Venonat", "Venomoth", "Diglett", "Dugtrio", "Meowth", "Persian", "Psyduck", "Golduck", "Mankey", "Primeape", "Growlithe", "Arcanine", "Poliwag", "Poliwhirl", "Poliwrath", "Abra", "Kadabra", "Alakazam", "Machop", "Machoke", "Machamp", "Bellsprout", "Weepinbell", "Victreebel", "Tentacool", "Tentacruel", "Geodude", "Graveler", "Golem", "Ponyta", "Rapidash", "Slowpoke", "Slowbro", "Magnemite", "Magneton", "Farfetch'd", "Doduo", "Dodrio", "Seel", "Dewgong", "Grimer", "Muk", "Shellder", "Cloyster", "Gastly", "Haunter", "Gengar", "Onix", "Drowzee", "Hypno", "Krabby", "Kingler", "Voltorb", "Electrode", "Exeggcute", "Exeggutor", "Cubone", "Marowak", "Hitmonlee", "Hitmonchan", "Lickitung", "Koffing", "Weezing", "Rhyhorn", "Rhydon", "Chansey", "Tangela", "Kangaskhan", "Horsea", "Seadra", "Goldeen", "Seaking", "Staryu", "Starmie", "Mr. Mime", "Scyther", "Jynx", "Electabuzz", "Magmar", "Pinsir", "Tauros", "Magikarp", "Gyarados", "Lapras", "Ditto", "Eevee", "Vaporeon", "Jolteon", "Flareon", "Porygon", "Omanyte", "Omastar", "Kabuto", "Kabutops", "Aerodactyl", "Snorlax", "Articuno", "Zapdos", "Moltres", "Dratini", "Dragonair", "Dragonite", "Mewtwo", "Mew"
        ];

        // Crear objeto de Pokémon con PC aleatorio pero coherente
        const POKEMONS = NAMES.map((name, index) => {
            const id = index + 1;
            // Cálculo de PC base: legendarios y evoluciones finales tienen más
            let basePC = 1000 + Math.floor(Math.random() * 2000);
            if (id === 150 || id === 151 || [144, 145, 146].includes(id)) basePC += 1500;
            if ([3, 6, 9, 65, 68, 94, 130, 143, 149].includes(id)) basePC += 800;

            return {
                id: id,
                name: name,
                pc: basePC,
                color: COLORS.red
            };
        });

        // Inicialización
        function init() {
            resize();
            loadImages();
            requestAnimationFrame(render);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function loadImages() {
            POKEMONS.forEach(p => {
                const img = new Image();
                img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${p.id}.png`;
                img.onload = () => { images[p.id] = img; };
            });
        }

        // Lógica de Dibujo del Catálogo
        const cardW = 150;
        const cardH = 180;
        const gap = 15;

        function drawCatalog() {
            const cols = Math.floor(canvas.width / (cardW + gap));
            const startX = (canvas.width - (cols * (cardW + gap) - gap)) / 2;
            const startY = 140 + scrollY;

            POKEMONS.forEach((p, i) => {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = startX + col * (cardW + gap);
                const y = startY + row * (cardH + gap);

                // Hitbox para interacción
                p.hitbox = { x, y, w: cardW, h: cardH };

                if (y + cardH < 0 || y > canvas.height) return;

                // Sombra
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 10;

                // Fondo de tarjeta
                const isSelected = selectedIds.has(p.id);
                const isHovered = hoveredId === p.id;

                ctx.fillStyle = isSelected ? COLORS.red : (isHovered ? '#3a4b5c' : '#243342');
                ctx.beginPath();
                ctx.roundRect(x, y, cardW, cardH, 12);
                ctx.fill();

                ctx.shadowBlur = 0;

                // Bordes
                ctx.strokeStyle = isSelected ? COLORS.yellow : 'rgba(255,255,255,0.1)';
                ctx.lineWidth = isSelected ? 4 : 1;
                ctx.stroke();

                // ID Number
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.font = '900 40px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(p.id.toString().padStart(3, '0'), x + cardW - 10, y + 40);

                // Imagen
                if (images[p.id]) {
                    ctx.drawImage(images[p.id], x + 15, y + 10, cardW - 30, cardW - 30);
                }

                // Nombre
                ctx.fillStyle = 'white';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.name.toUpperCase(), x + cardW / 2, y + cardH - 35);

                // PC
                ctx.fillStyle = isSelected ? 'white' : COLORS.yellow;
                ctx.font = '900 16px Arial';
                ctx.fillText(`${p.pc} PC`, x + cardW / 2, y + cardH - 15);
            });
        }

        // Lógica de Batalla
        function drawBattle() {
            const playerTeam = POKEMONS.filter(p => selectedIds.has(p.id));
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Fondo gradiente
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#1a252f');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Círculos de Arena
            ctx.strokeStyle = 'rgba(241, 196, 15, 0.1)';
            ctx.lineWidth = 2;
            for (let i = 1; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, i * 150, 0, Math.PI * 2);
                ctx.stroke();
            }

            // VS Texto
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.font = '900 300px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("VS", centerX, centerY);

            // Renderizar lados
            renderTeamSide(playerTeam, canvas.width * 0.15, "TU EQUIPO", COLORS.yellow, playerTotal, true);
            renderTeamSide(rivalTeam, canvas.width * 0.85 - 200, "RIVAL", COLORS.red, rivalTotal, false);

            if (gameState === 'RESULT') {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const playerWins = playerTotal >= rivalTotal;
                const winnerText = playerWins ? "¡VICTORIA!" : "DERROTA";

                ctx.shadowColor = playerWins ? COLORS.yellow : COLORS.red;
                ctx.shadowBlur = 20;
                ctx.fillStyle = playerWins ? COLORS.yellow : COLORS.red;
                ctx.font = 'italic 900 100px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(winnerText, centerX, centerY - 20);

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.fillText(`${playerTotal} PC TOTAL VS ${rivalTotal} PC TOTAL`, centerX, centerY + 60);

                const subText = playerWins ? "Has dominado el estadio" : "Sigue entrenando para la próxima";
                ctx.font = '16px Arial';
                ctx.fillStyle = COLORS.grey;
                ctx.fillText(subText.toUpperCase(), centerX, centerY + 100);
            }
        }

        function renderTeamSide(team, xStart, label, color, total, isPlayer) {
            ctx.textAlign = 'left';

            // Etiqueta de equipo
            ctx.fillStyle = color;
            ctx.font = '900 20px Arial';
            ctx.fillText(label, xStart, 160);

            // Total PC
            ctx.fillStyle = 'white';
            ctx.font = '900 45px Arial';
            ctx.fillText(total.toLocaleString(), xStart, 210);
            ctx.font = 'bold 15px Arial';
            ctx.fillStyle = color;
            ctx.fillText("PC TOTAL", xStart, 230);

            // Lista de Pokémon
            team.forEach((p, i) => {
                const y = 260 + i * 75;

                // Card pequeña
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.roundRect(xStart, y, 240, 65, 8);
                ctx.fill();

                if (images[p.id]) {
                    ctx.drawImage(images[p.id], xStart + 5, y + 5, 55, 55);
                }

                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Arial';
                ctx.fillText(p.name.toUpperCase(), xStart + 70, y + 25);

                ctx.fillStyle = color;
                ctx.font = '900 16px Arial';
                ctx.fillText(`${p.pc} PC`, xStart + 70, y + 48);
            });
        }

        // Loop Principal
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'CATALOG') {
                drawCatalog();
            } else {
                drawBattle();
            }

            requestAnimationFrame(render);
        }

        // Interacciones
        canvas.addEventListener('mousemove', (e) => {
            if (gameState !== 'CATALOG') return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            hoveredId = null;
            POKEMONS.forEach(p => {
                if (p.hitbox && mouseX > p.hitbox.x && mouseX < p.hitbox.x + p.hitbox.w &&
                    mouseY > p.hitbox.y && mouseY < p.hitbox.y + p.hitbox.h) {
                    hoveredId = p.id;
                }
            });
        });

        canvas.addEventListener('click', () => {
            if (gameState !== 'CATALOG') return;
            if (hoveredId) {
                if (selectedIds.has(hoveredId)) {
                    selectedIds.delete(hoveredId);
                } else if (selectedIds.size < 6) {
                    selectedIds.add(hoveredId);
                }
                updateUI();
            }
        });

        window.addEventListener('wheel', (e) => {
            if (gameState !== 'CATALOG') return;
            scrollY -= e.deltaY;

            // Limitar scroll dinámicamente según tamaño de pantalla
            const cols = Math.floor(canvas.width / (cardW + gap));
            const rows = Math.ceil(POKEMONS.length / cols);
            const totalContentH = rows * (cardH + gap) + 200;

            const maxScroll = 0;
            const minScroll = Math.min(0, canvas.height - totalContentH);

            scrollY = Math.min(maxScroll, Math.max(minScroll, scrollY));
        });

        function updateUI() {
            teamCountDisplay.textContent = `${selectedIds.size} / 6`;
            if (selectedIds.size === 6) {
                btnBattle.classList.remove('hidden');
                instruction.textContent = "¡Equipo listo! Pulsa Batalla";
            } else {
                btnBattle.classList.add('hidden');
                instruction.textContent = "Selecciona 6 Pokémon para desafiar a la máquina";
            }
        }

        function startBattle() {
            gameState = 'BATTLE';
            btnBattle.classList.add('hidden');
            instruction.classList.add('hidden');

            // Generar equipo rival al azar (6 únicos)
            rivalTeam = [...POKEMONS]
                .sort(() => 0.5 - Math.random())
                .slice(0, 6);

            playerTotal = POKEMONS
                .filter(p => selectedIds.has(p.id))
                .reduce((sum, p) => sum + p.pc, 0);

            rivalTotal = rivalTeam.reduce((sum, p) => sum + p.pc, 0);

            // Simular carga de batalla
            setTimeout(() => {
                gameState = 'RESULT';
                btnReset.classList.remove('hidden');
            }, 2500);
        }

        function resetApp() {
            selectedIds.clear();
            gameState = 'CATALOG';
            btnReset.classList.add('hidden');
            instruction.classList.remove('hidden');
            scrollY = 0;
            updateUI();
        }

        window.addEventListener('resize', resize);
        init();

    </script>
</body>

</html>
